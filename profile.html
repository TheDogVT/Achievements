    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<nav class="site-nav">
    <div class="nav-inner">
        <a href="index.html" class="nav-brand">⬡ Cosmic Playground</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="achievements.html">Achievements</a>
            <a href="profile.html" class="active">My Profile</a>
        </div>
    </div>
</nav>

<!-- CONSTELLATION CANVAS -->
<canvas id="constellation"></canvas>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
    <div class="loading-title">⬡ Profile</div>
    <div class="loading-bar-wrap">
        <div class="loading-bar-fill" id="loadingBarFill"></div>
    </div>
    <div id="loadingStatus">Loading data…</div>
</div>

<!-- MAIN APP (hidden until loaded) -->
<div id="appContent">
<div class="page-wrap" style="max-width:700px; margin:0 auto;">

    <div id="profileContent">
        <!-- Built by JS -->
    </div>

</div>
</div><!-- /appContent -->

<!-- TOAST -->
<div id="toast"></div>

<script src="data.js"></script>
<script src="constellation.js"></script>
<script>

// ── PROFILE PAGE ──────────────────────────────────────────────────────

function buildProfilePage(userId) {
    const userData = allUserData[userId];
    if (!userData) {
        showProfileSearch('User not found.');
        return;
    }

    const earned  = userData.achievements?.earned  || {};
    const founded = userData.achievements?.founded || {};
    const allUserAchs = { ...earned, ...founded };
    const earnedCount  = Object.keys(earned).length;
    const foundedCount = Object.keys(founded).length;
    const total = Object.values(achData).reduce((s, v) => s + Object.keys(v).length, 0);
    const pct   = total > 0 ? Math.round(((earnedCount + foundedCount) / total) * 100) : 0;
    const name  = userData.username || userId;

    // ── HERO ──
    const pfp = pfpByUsername[name.toLowerCase()];
    const avatarStyle = pfp ? `background-image:url(${pfp});background-size:cover;background-position:center;` : '';
    const avatarInitial = pfp ? '' : name[0].toUpperCase();

    const savedUser = getCookie('myAchievementsUser');
    const isSaved = savedUser && savedUser.userId === userId;

    // ── CATEGORY BREAKDOWN ──
    const catRows = Object.entries(achData).map(([cat, achs]) => {
        const catIds = Object.keys(achs);
        const userCount = catIds.filter(id => allUserAchs[id]).length;
        const pctCat = catIds.length > 0 ? Math.round((userCount / catIds.length) * 100) : 0;
        const icon = CAT_ICONS[cat] || '🔹';
        return `
            <div class="cat-row">
                <div class="cat-header">
                    <span class="cat-icon">${icon}</span>
                    <span class="cat-name">${capitalize(cat)}</span>
                    <span class="cat-count">${userCount} / ${catIds.length}</span>
                </div>
                <div class="cat-bar-wrap">
                    <div class="cat-bar-fill" style="width:${pctCat}%"></div>
                </div>
            </div>`;
    }).join('');

    // ── STREAM STATS ──
    const stats = userData.stats || {};
    const topMonths = userData.top_months || [];

    const KIND_LABELS = {
        chat:      { icon: '💬', label: 'Top Chatter' },
        cheers:    { icon: '⚡', label: 'Top Cheerer' },
        gifted:    { icon: '🎁', label: 'Top Gifter' },
        donations: { icon: '💛', label: 'Top Supporter' },
    };

    const formatMonth = ym => {
        if (!ym) return '';
        // Full ISO timestamp → extract YYYY-MM portion first
        const parts = ym.includes('T') ? ym.split('T')[0].split('-') : ym.split('-');
        const [y, m] = parts;
        return new Date(+y, +m - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    };

    const streamStatsHTML = (() => {
        const rows = [];
        if (stats.messages != null)
            rows.push(`<div class="stream-stat-row"><span class="stream-stat-icon">💬</span><span class="stream-stat-label">Messages sent</span><span class="stream-stat-value">${stats.messages.toLocaleString()}</span></div>`);
        if (stats.active_months != null)
            rows.push(`<div class="stream-stat-row"><span class="stream-stat-icon">📅</span><span class="stream-stat-label">Active months</span><span class="stream-stat-value">${stats.active_months}</span></div>`);
        if (stats.first_seen)
            rows.push(`<div class="stream-stat-row"><span class="stream-stat-icon">🌟</span><span class="stream-stat-label">First seen</span><span class="stream-stat-value">${formatMonth(stats.first_seen)}</span></div>`);
        if (!rows.length) return '';
        return `<div class="stream-stats-card"><div class="stream-stats-title">📊 Stream Stats</div>${rows.join('')}</div>`;
    })();

    const RANK_META = {
        1: { badge: '#1', cls: 'rank-gold',   trophy: '🥇' },
        2: { badge: '#2', cls: 'rank-silver', trophy: '🥈' },
        3: { badge: '#3', cls: 'rank-bronze', trophy: '🥉' },
    };

    const topMonthsHTML = (() => {
        if (!topMonths.length) return '';
        const items = topMonths.map(({ month, kind, rank }) => {
            const meta   = KIND_LABELS[kind] || { icon: '🏆', label: kind };
            const rankM  = RANK_META[rank] || RANK_META[3];
            return `
                <div class="top-month-item">
                    <span class="top-month-trophy">${rankM.trophy}</span>
                    <div class="top-month-body">
                        <div class="top-month-label">${formatMonth(month)}</div>
                        <div class="top-month-kind">${meta.icon} ${meta.label}</div>
                    </div>
                    <span class="top-month-badge ${rankM.cls}">${rankM.badge}</span>
                </div>`;
        }).join('');
        return `<div class="top-months-card"><div class="top-months-title">🏆 Top of the Month</div><div class="top-months-list">${items}</div></div>`;
    })();

    // ── ACHIEVEMENT TIMELINE ──
    const timelineItems = [];
    for (const [achId, ts] of Object.entries(allUserAchs)) {
        let achName = achId, achCat = 'specific';
        for (const [cat, achs] of Object.entries(achData)) {
            if (achs[achId]) { achName = achs[achId].name; achCat = cat; break; }
        }
        const isFounder = !!founded[achId];
        timelineItems.push({ achId, achName, achCat, ts, isFounder });
    }
    timelineItems.sort((a, b) => new Date(b.ts) - new Date(a.ts));

    const timelineHTML = timelineItems.slice(0, 20).map(item => {
        const d = new Date(item.ts);
        const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const icon = CAT_ICONS[item.achCat] || '🔹';
        const founderBadge = item.isFounder
            ? '<span class="timeline-badge">FOUNDER</span>'
            : '';
        return `
            <div class="timeline-item">
                <div class="timeline-dot${item.isFounder ? ' founder' : ''}"></div>
                <div class="timeline-body">
                    <div class="timeline-name">${icon} ${item.achName}</div>
                    <div class="timeline-meta">${item.isFounder ? 'Founded' : 'Unlocked'} · ${dateStr}</div>
                </div>
                ${founderBadge}
            </div>`;
    }).join('');

    const moreCount = timelineItems.length > 20 ? timelineItems.length - 20 : 0;

    // ── ACHIEVEMENTS PER MONTH CHART ──
    const achByMonth = {};
    for (const [, ts] of Object.entries(earned)) {
        const ym = ts.split('T')[0].slice(0, 7);
        if (!achByMonth[ym]) achByMonth[ym] = { earned: 0, founded: 0 };
        achByMonth[ym].earned++;
    }
    for (const [, ts] of Object.entries(founded)) {
        const ym = ts.split('T')[0].slice(0, 7);
        if (!achByMonth[ym]) achByMonth[ym] = { earned: 0, founded: 0 };
        achByMonth[ym].founded++;
    }
    const chartMonths = Object.keys(achByMonth).sort();
    const chartData   = chartMonths.map(m => achByMonth[m]);
    const showChart   = chartMonths.length > 0;

    const achChartHTML = showChart ? `
        <div class="ach-chart-card">
            <div class="ach-chart-title">📅 Achievements by Month</div>
            <canvas id="achChart" style="width:100%;display:block;"></canvas>
            <div class="ach-chart-legend">
                <span class="ach-legend-dot" style="background:#4ecdc4;"></span><span>Earned</span>
                <span class="ach-legend-dot" style="background:#ffd700;"></span><span>Founded</span>
            </div>
        </div>` : '';

    document.getElementById('profileContent').innerHTML = `
        <div class="profile-hero">
            <div class="profile-hero-avatar" id="heroAvatar" style="${avatarStyle}">${avatarInitial}</div>
            <div class="profile-hero-info">
                <div class="profile-hero-name">${name}</div>
                <div class="profile-hero-sub">${earnedCount + foundedCount} / ${total} discovered · ${pct}% of found${foundedCount > 0 ? ` · ${foundedCount} founded` : ''}</div>
                <div class="profile-hero-bar-wrap">
                    <div class="profile-hero-bar-fill" style="width:${pct}%"></div>
                </div>
            </div>
            <a href="achievements.html?user=${encodeURIComponent(name)}" class="profile-hero-achs-btn">View Achievements &rsaquo;</a>
        </div>

        <div class="profile-stat-grid">
            <div class="profile-stat">
                <div class="profile-stat-value">${earnedCount + foundedCount}</div>
                <div class="profile-stat-label">Total Earned</div>
            </div>
            <div class="profile-stat">
                <div class="profile-stat-value">${foundedCount}</div>
                <div class="profile-stat-label">Founded</div>
            </div>
            <div class="profile-stat">
                <div class="profile-stat-value">${pct}%</div>
                <div class="profile-stat-label">of Found</div>
            </div>
        </div>

        ${topMonthsHTML}

        ${streamStatsHTML}

        <div class="profile-cat-breakdown">
            <div class="profile-cat-title">By Category</div>
            ${catRows}
        </div>

        ${achChartHTML}

        ${timelineHTML ? `
        <div class="profile-timeline-card">
            <div class="profile-timeline-title">Achievement Timeline</div>
            ${timelineHTML}
            ${moreCount > 0 ? `<a href="achievements.html?user=${encodeURIComponent(name)}" class="timeline-more">+ ${moreCount} more achievements →</a>` : ''}
        </div>` : ''}

        <div class="profile-actions">
            <a href="achievements.html?user=${encodeURIComponent(name)}" class="btn btn-primary" style="text-decoration:none">View All Achievements</a>
            ${isSaved
                ? `<button class="btn btn-ghost" id="unclaimBtn">Forget me</button>`
                : `<button class="btn btn-ghost" id="claimProfileBtn">This is me!</button>`}
        </div>
    `;

    if (showChart) requestAnimationFrame(() => drawAchChart(chartMonths, chartData));

    // Claim / unclaim handlers
    const claimBtn = document.getElementById('claimProfileBtn');
    if (claimBtn) {
        claimBtn.addEventListener('click', () => {
            const allTs = Object.values(allUserAchs);
            let mostRecent = null;
            for (const ts of allTs) {
                const d = new Date(ts);
                if (!mostRecent || d > mostRecent) mostRecent = d;
            }
            setCookie('myAchievementsUser', {
                userId,
                username: name,
                lastAchievementDate: mostRecent ? mostRecent.toISOString() : null,
            });
            claimBtn.textContent = 'Saved ✓';
            claimBtn.disabled = true;
            showToast('Saved! This profile will auto-load next visit.');
        });
    }

    const unclaimBtn = document.getElementById('unclaimBtn');
    if (unclaimBtn) {
        unclaimBtn.addEventListener('click', () => {
            setCookie('myAchievementsUser', null, -1);
            unclaimBtn.textContent = 'Cleared';
            unclaimBtn.disabled = true;
            showToast('Profile cleared.');
        });
    }
}

function drawAchChart(months, data) {
    const canvas = document.getElementById('achChart');
    if (!canvas) return;

    const dpr  = window.devicePixelRatio || 1;
    const W    = canvas.getBoundingClientRect().width || 600;
    const H    = 140;
    canvas.width        = Math.round(W * dpr);
    canvas.height       = Math.round(H * dpr);
    canvas.style.height = H + 'px';

    const ctx    = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const pad    = { top: 12, right: 8, bottom: 32, left: 26 };
    const chartW = W - pad.left - pad.right;
    const chartH = H - pad.top  - pad.bottom;
    const n      = months.length;
    const maxVal = Math.max(...data.map(d => d.earned + d.founded), 1);

    // Bar sizing — cap width and centre if few months
    const gap     = 3;
    const rawBarW = (chartW - gap * (n - 1)) / n;
    const barW    = Math.min(36, Math.max(4, rawBarW));
    const totalW  = barW * n + gap * (n - 1);
    const originX = pad.left + (chartW - totalW) / 2;

    // Grid lines + y labels
    const gridSteps = 4;
    for (let i = 0; i <= gridSteps; i++) {
        const y = pad.top + chartH - (i / gridSteps) * chartH;
        ctx.strokeStyle = i === 0 ? 'rgba(255,255,255,0.10)' : 'rgba(255,255,255,0.04)';
        ctx.lineWidth   = 1;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + chartW, y); ctx.stroke();
        if (i > 0 && maxVal > 0) {
            ctx.fillStyle  = '#38385a';
            ctx.font       = '9px Consolas, monospace';
            ctx.textAlign  = 'right';
            ctx.fillText(Math.round((i / gridSteps) * maxVal), pad.left - 3, y + 3);
        }
    }

    // Bars + x labels
    const labelEvery = n > 24 ? 3 : n > 12 ? 2 : 1;
    let lastYear = null;

    months.forEach((ym, i) => {
        const x       = originX + i * (barW + gap);
        const earned  = data[i].earned;
        const founded = data[i].founded;
        const total   = earned + founded;

        if (earned > 0) {
            const bh    = (earned / maxVal) * chartH;
            const by    = pad.top + chartH - bh - (founded / maxVal) * chartH;
            const grad  = ctx.createLinearGradient(0, by, 0, by + bh);
            grad.addColorStop(0, '#6edcd8');
            grad.addColorStop(1, '#3ab5ae');
            ctx.fillStyle = grad;
            ctx.beginPath();
            if (ctx.roundRect) ctx.roundRect(x, by, barW, bh, [2, 2, 0, 0]);
            else ctx.rect(x, by, barW, bh);
            ctx.fill();
        }

        if (founded > 0) {
            const fh   = (founded / maxVal) * chartH;
            const fy   = pad.top + chartH - (total / maxVal) * chartH;
            const grad = ctx.createLinearGradient(0, fy, 0, fy + fh);
            grad.addColorStop(0, '#ffe040');
            grad.addColorStop(1, '#c8a000');
            ctx.fillStyle = grad;
            ctx.beginPath();
            if (ctx.roundRect) ctx.roundRect(x, fy, barW, fh, [2, 2, 0, 0]);
            else ctx.rect(x, fy, barW, fh);
            ctx.fill();
        }

        if (i % labelEvery === 0) {
            const [y, m]  = ym.split('-');
            const monthLbl = new Date(+y, +m - 1).toLocaleDateString('en-US', { month: 'short' });
            ctx.fillStyle  = '#484870';
            ctx.font       = '9px Consolas, monospace';
            ctx.textAlign  = 'center';
            ctx.fillText(monthLbl, x + barW / 2, pad.top + chartH + 13);
            if (y !== lastYear) {
                ctx.fillStyle = '#303055';
                ctx.fillText(y, x + barW / 2, pad.top + chartH + 24);
                lastYear = y;
            }
        }
    });
}

function showProfileSearch(msg) {
    const savedUser = getCookie('myAchievementsUser');

    document.getElementById('profileContent').innerHTML = `
        <div class="profile-search-card">
            <div class="profile-search-title">⬡ My Profile</div>
            <div class="profile-no-user">
                ${msg ? `<p style="color:var(--muted)">${msg}</p>` : ''}
                ${savedUser
                    ? `<p>Your saved profile: <strong style="color:var(--cyan)">${savedUser.username}</strong></p>
                       <a href="profile.html?user=${encodeURIComponent(savedUser.username)}" class="btn btn-primary" style="text-decoration:none">View My Profile</a>`
                    : `<p>Search for your username on the <a href="achievements.html" style="color:var(--cyan)">Achievements</a> page and click "This is me!" to save your profile.</p>
                       <a href="achievements.html" class="btn btn-primary" style="text-decoration:none">Browse Achievements</a>`}
            </div>
        </div>`;
}

// ── STARTUP ───────────────────────────────────────────────────────────
loadAllData().then(() => {
    const userParam = new URLSearchParams(window.location.search).get('user');
    const savedUser = getCookie('myAchievementsUser');

    let userId = null;
    if (userParam) {
        userId = isNaN(Number(userParam))
            ? usernameMap[userParam.toLowerCase()]
            : userParam;
    } else if (savedUser?.userId) {
        userId = savedUser.userId;
    }

    if (userId && allUserData[userId]) {
        buildProfilePage(userId);
    } else {
        showProfileSearch(userParam ? 'User not found.' : null);
    }

});

</script>
</body>
</html>
